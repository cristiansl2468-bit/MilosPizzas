<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Haz tu Pedido - Milo's Pizza</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <img src="img/logo.jpg" alt="Logo" class="logo">
        <nav>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="menu.html">Nuestro Menú</a></li>
                <li><a href="contacto.html">Haz tu Pedido</a></li>
                <li><a href="login.html">Acceder</a></li>
            </ul>
        </nav>
    </header>

    <main class="form-container">
        <h2>Realiza tu Pedido Web</h2>
        <p>Completa tus datos y un cajero confirmará tu orden en breve.</p>
        
        <form class="order-form">
            <label>Nombre Completo:</label>
            <input type="text" placeholder="Ej. Juan Pérez">
            
            <label>Selecciona tu Pizza:</label>
            <select>
                <option>Pepperoni Clásica</option>
                <option>Mexicana Especial</option>
                <option>Hawaiana Real</option>
            </select>
            
            <label>Dirección de Entrega:</label>
            <textarea placeholder="Calle, número y colonia..."></textarea>
            
            <button type="button" class="btn">Confirmar Pedido</button>
        </form>
    </main>

    <footer>
        <p>&copy; 2026 Milo's Pizza</p>
    </footer>
</body>
</html>
